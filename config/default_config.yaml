# Configuração padrão — Pipeline Eye-Tracking Cocoa Fabric (H#5)

sampling_rate_hz: 120

cleaning:
  interp_method: linear  # linear | spline

eckert:
  w_fix: 0.7
  l_background: 0.25
  plr_k: 0.15
  plr_epsilon: 0.01
  baseline_seconds: 5.0
  plr_lowpass_hz: 2.0
  calibration_model: log  # log | poly2 | sigmoid

luminance_map:
  Wall: 0.80
  Instruction: 0.82
  Tutorial: 0.82
  Quadro: 0.80
  Poster: 0.78
  Wood: 0.40
  Checker: 0.35
  default: 0.50

voi:
  # Palavras-chave que classificam o Target como "support" (áreas contextuais
  # como paredes/quadros). Elas NÃO contam como socorro para efeito de
  # RescueSaccade — só disparam sacada de socorro alvos "tutorial".
  support_keywords:
    - wall
    - quadro
    - poster
  # Prefixos e palavras que identificam painéis de tutorial (imagens de ajuda).
  # Ajuste conforme a nomenclatura dos GameObjects no Unity.
  tutorial_name_prefixes:
    - Instrucoes
    - Instruções
    - Paper
    - Writebook
    - InstMat
  tutorial_name_keywords:
    - tutorial
    - instruction
  use_aoi_barrier_as_support: false
  support_targets: []
  tutorial_targets: []
  task_targets: []
  # Itens interativos: reconhecidos pela coluna TargetCategory (builds >=0.9.15)
  # ou, em CSVs antigos, por estas tags/keywords de nome.
  item_tags:
    - Cacau
    - Faca
    - Manteiga
    - Leite
    - Acucar
    - Seed
    - RawCuttedSeed
    - DrySeed
    - ToastedSeed
    - PlateWithSeed
    - Pan
    - Plate
    - Bandeja
    - Choco
    - Chocolate
  item_name_keywords:
    - seed
    - semente
    - cacau
    - choco
    - faca
    - knife
    - pan
    - panela
    - manteiga
    - butter
    - leite
    - milk
    - acucar
    - sugar
  # Maquinas: reconhecidas por TargetCategory ou por nome.
  machine_targets: []
  machine_name_keywords:
    - grinder
    - mixer
    - toaster
    - peeler
    - dehumidifier
    - oven
    - fridge
    - spoon

# Deteccao de fixacoes I-DT (Salvucci & Goldberg, 2000) sobre a direcao do olhar.
fixation:
  dispersion_deg: 1.5
  min_duration_s: 0.1

# Sacada de socorro (busca por tutorial) e consulta antes/depois da tarefa.
rescue:
  # Lacuna minima (s) entre fixacoes de tutorial para separar consultas distintas.
  # Fixacoes de tutorial mais proximas que isto sao unidas numa unica consulta
  # (evita inflar a contagem com alternancia Writebook_4 <-> Writebook_5).
  min_gap_s: 0.3
  # Janela (s) ao redor do inicio da atividade para classificar a consulta ao
  # tutorial como "antes" (antecipatoria) ou "depois" (reativa) da tarefa.
  window_s: 8.0

gaze_entropy:
  window_seconds: 2.0
  step_seconds: 1.0
  n_bins: 8

confusion:
  # Detecção de episódios de CONFUSÃO/BUSCA visual: momentos em que o olhar
  # varre a cena de forma errática (alta entropia espacial) trocando de alvo
  # rapidamente, sem fixar — típico de "procurar algo que não está onde
  # deveria" (ex.: objeto que não renderizou). Ouro para prevenção de erros.
  #
  # Limiar de entropia é adaptativo por sessão: usa o percentil abaixo sobre
  # a distribuição de GazeEntropy da própria sessão.
  entropy_percentile: 70
  # Taxa mínima de troca de alvo (TargetChanged por segundo) numa janela.
  min_switch_rate_hz: 0.8
  switch_window_seconds: 2.0
  # Duração mínima de um episódio para ser reportado.
  min_episode_seconds: 1.5
  # Une episódios separados por lacunas curtas.
  merge_gap_seconds: 0.6
  # Score contínuo de confusão com LIMIARES ABSOLUTOS (comparável entre builds).
  # Combina entropia espacial, taxa de troca de alvo e coeficiente K (ambiente).
  absolute:
    entropy_bits_lo: 3.5     # abaixo disto: sem contribuição de entropia
    entropy_bits_hi: 5.5     # no/acima disto: contribuição máxima
    switch_rate_lo_hz: 0.8
    switch_rate_hi_hz: 3.0
    k_ambient_scale: 1.0     # escala do coeficiente K negativo (atenção ambiente)
    weight_entropy: 0.4
    weight_switch: 0.4
    weight_k: 0.2
    score_threshold: 0.5     # score >= limiar marca a amostra como confusão

phases:
  phase3_names:
    - Phase3
    - Fase3
    - Moldes
    - Molds
    - Step07_Moldes
    - Step08_Moldes
    - Step09_Moldes
    - Step10_Moldes

activities:
  # Ordem esperada das atividades para exibição no summary_by_activity.csv e
  # no grid plot_activity_grid. Rótulos vindos do Unity (EyeTrackingData.Activity)
  # que não estiverem aqui ficam no final, em ordem alfabética.
  expected_order:
    - CortarCacau
    - SecarSemente
    - DescascarSemente
    - TorrarAmendoa
    - Moer
    - Misturar
    - Formar

output:
  save_parquet: true
